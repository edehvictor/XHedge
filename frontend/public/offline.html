<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline | XHedge</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: radial-gradient(circle at 20% 20%, #1e293b, #050816 60%);
        color: #e2e8f0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .container {
        width: 100%;
        max-width: 480px;
      }

      main {
        text-align: center;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 14px;
        padding: 2rem 1.5rem;
      }

      .offline-banner {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        color: #fca5a5;
      }

      .offline-indicator {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        background: rgba(239, 68, 68, 0.2);
        border-radius: 50%;
        flex-shrink: 0;
      }

      .offline-indicator::after {
        content: '';
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 1.5rem;
        font-weight: 600;
      }

      p {
        margin: 0 0 1.5rem;
        line-height: 1.6;
        color: #cbd5e1;
      }

      .cached-data {
        margin: 1.5rem 0;
        padding: 1rem;
        background: rgba(148, 163, 184, 0.1);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 8px;
        text-align: left;
      }

      .cached-data h3 {
        margin: 0 0 0.75rem;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
      }

      .data-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
      }

      .data-row:last-child {
        margin-bottom: 0;
      }

      .data-label {
        color: #94a3b8;
      }

      .data-value {
        font-weight: 500;
        color: #e2e8f0;
      }

      .cached-timestamp {
        margin-top: 0.75rem;
        font-size: 0.75rem;
        color: #64748b;
        padding-top: 0.75rem;
        border-top: 1px solid rgba(148, 163, 184, 0.1);
      }

      .retry-button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-block;
      }

      .retry-button:hover {
        background: #2563eb;
        transform: translateY(-1px);
      }

      .retry-button:active {
        transform: translateY(0);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <main>
        <div class="offline-banner">
          <div class="offline-indicator"></div>
          <span>No internet connection</span>
        </div>

        <h1>You are offline</h1>
        <p>XHedge is showing cached data. Some features may be limited until you reconnect.</p>

        <div id="cached-vault" class="cached-data hidden">
          <h3>Cached Vault Data</h3>
          <div class="data-row">
            <span class="data-label">Your Balance</span>
            <span class="data-value" id="cached-balance">—</span>
          </div>
          <div class="data-row">
            <span class="data-label">Share Price</span>
            <span class="data-value" id="cached-price">—</span>
          </div>
          <div class="cached-timestamp">
            <span id="cached-time">Last updated: Never</span>
          </div>
        </div>

        <button class="retry-button" onclick="location.reload()">
          Try Again
        </button>
      </main>
    </div>

    <script>
      // Load and display cached vault data
      function loadCachedData() {
        try {
          const vaultDataStr = localStorage.getItem('xhedge-vault-cache');
          if (!vaultDataStr) return;

          const data = JSON.parse(vaultDataStr);
          const cacheTime = localStorage.getItem('xhedge-vault-cache-time');

          const cachedVaultEl = document.getElementById('cached-vault');
          const balanceEl = document.getElementById('cached-balance');
          const priceEl = document.getElementById('cached-price');
          const timeEl = document.getElementById('cached-time');

          if (data.userBalance && data.sharePrice) {
            // Format balance for display
            const balance = parseFloat(data.userBalance) / 1e7;
            balanceEl.textContent = balance.toFixed(2);

            // Format share price
            const price = parseFloat(data.sharePrice);
            priceEl.textContent = '$' + price.toFixed(4);

            // Format timestamp
            if (cacheTime) {
              const lastUpdate = new Date(parseInt(cacheTime));
              const timeStr = lastUpdate.toLocaleString();
              timeEl.textContent = `Last updated: ${timeStr}`;
            }

            cachedVaultEl.classList.remove('hidden');
          }
        } catch (error) {
          console.error('Error loading cached data:', error);
        }
      }

      // Load cached data on page load
      document.addEventListener('DOMContentLoaded', loadCachedData);

      // Listen for online event
      window.addEventListener('online', () => {
        setTimeout(() => {
          location.reload();
        }, 1000);
      });
    </script>
  </body>
</html>
